# /etc/nginx/sites-available/zenfocus
#
# Replace `app.example.com` with your domain before installing. After running
# `certbot --nginx -d app.example.com` certbot will rewrite the listen 443
# block with managed cert paths and add the http→https redirect; the
# placeholders below are ready for that.

upstream zenfocus_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream zenfocus_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name app.example.com;

    # certbot serves ACME challenges from here before TLS is set up
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.example.com;

    # certbot --nginx will fill these in:
    # ssl_certificate /etc/letsencrypt/live/app.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/app.example.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # WebSocket upgrade (Socket.io)
    location /socket.io/ {
        proxy_pass http://zenfocus_api;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API — strip the /api prefix before forwarding to NestJS
    location /api/ {
        proxy_pass http://zenfocus_api/;
        proxy_read_timeout 60s;
    }

    # Next.js app
    location / {
        proxy_pass http://zenfocus_web;
        proxy_read_timeout 60s;
    }
}
