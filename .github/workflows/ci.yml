name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: zenfocus
          POSTGRES_PASSWORD: zenfocus
          POSTGRES_DB: zenfocus_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U zenfocus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://zenfocus:zenfocus@localhost:5432/zenfocus_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-at-least-thirty-two-characters-long
      JWT_REFRESH_SECRET: test-jwt-refresh-secret-at-least-thirty-two-chars
      CORS_ORIGIN: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      RESEND_API_KEY: re_test
      RESEND_FROM_EMAIL: test@example.com

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @zenfocus/types build

      - run: pnpm --filter api exec prisma generate

      - run: pnpm --filter api exec prisma migrate deploy

      - run: pnpm turbo run lint typecheck test
