# Production stack. Pulls prebuilt images from GHCR.
#
# Usage on VPS:
#   export TAG=<git-sha-or-tag>          # defaults to "latest"
#   export GHCR_OWNER=<github-owner>     # required
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Nginx on the host proxies to 127.0.0.1:3000 (web) and 127.0.0.1:3001 (api).
# Postgres and Redis are not exposed to the host — only reachable on the
# zenfocus_network bridge.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - zenfocus_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - zenfocus_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  api-migrate:
    image: ghcr.io/${GHCR_OWNER}/zenfocus-api:${TAG:-latest}
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: ['node', 'node_modules/prisma/build/index.js', 'migrate', 'deploy']
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zenfocus_network
    restart: 'no'

  api:
    image: ghcr.io/${GHCR_OWNER}/zenfocus-api:${TAG:-latest}
    restart: unless-stopped
    ports:
      - '127.0.0.1:3001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN}
      FRONTEND_URL: ${FRONTEND_URL}
      APP_URL: ${APP_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      UNSPLASH_ACCESS_KEY: ${UNSPLASH_ACCESS_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
    networks:
      - zenfocus_network
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    image: ghcr.io/${GHCR_OWNER}/zenfocus-web:${TAG:-latest}
    restart: unless-stopped
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:3001}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - zenfocus_network
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
  redis_data:

networks:
  zenfocus_network:
    driver: bridge
